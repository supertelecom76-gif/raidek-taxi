<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تحميل تطبيق رايدك</title>
<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background: #0f0f0f;
    color: white;
    text-align: center;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
}
.container {
    max-width: 400px;
}
h1 {
    font-size: 28px;
    margin-bottom: 10px;
}
p {
    color: #bbbbbb;
    margin-bottom: 30px;
}
.button {
    display: block;
    width: 100%;
    padding: 15px;
    margin: 10px 0;
    border-radius: 8px;
    text-decoration: none;
    font-size: 16px;
    font-weight: bold;
    transition: 0.3s;
}
.customer {
    background: #f1c40f;
    color: black;
}
.captain {
    background: #ffffff;
    color: black;
}
.button:hover {
    opacity: 0.8;
}
</style>
</head>
<body>

<div class="container">
    <h1>تحميل تطبيق رايدك</h1>
    <p>اختر نوع التطبيق للتحميل</p>

    <a class="button customer" href="https://play.google.com/store/apps/details?id=com.twsyla.twsyla&pcampaignid=web_share" target="_blank">
        تحميل تطبيق الزبون (Android)
    </a>

    <a class="button captain" href="https://play.google.com/store/apps/details?id=com.ashbar.appuser&pcampaignid=web_share" target="_blank">
        تحميل تطبيق الكابتن (Android)
    </a>

</div>

</body>
</html>
